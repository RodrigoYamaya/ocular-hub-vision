<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OcularHub Vision - Central de Saúde Ocular</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Ocular<span>Hub</span> Vision</h1>
        </div>
        <div class="user-info">
            <p>Olá, Dr. Rodrigo</p>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="#" class="active">Novo Exame</a></li>
            <li><a href="#">Pacientes</a></li>
            <li><a href="#">Histórico</a></li>
            <li><a href="#">Dashboard</a></li>
        </ul>
    </nav>

    <main>
        <section class="upload-container">
            <h2>Análise de Imagem Ocular</h2>
            <p>Selecione a imagem da retina (Retinografia) para iniciar a triagem inteligente.</p>
            
            <form action="#" class="upload-form">
                <div class="drop-zone">
                    <span class="drop-zone-text">Arraste a imagem ou clique aqui</span>
                    <input type="file" name="file" class="file-input" accept="image/*">                </div>
                <button type="submit" class="btn-analisar">Iniciar Análise</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 OcularHub Vision - Desenvolvido por RodSolution</p>
    </footer>


    <script src="script.js"></script>
</body>
</html>
