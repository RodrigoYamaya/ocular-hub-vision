<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Médico | OcularHub Vision</title>
    
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/novo_medico.css">
</head>
<body>

    <header>
        <div class="logo">
            <a href="home.html" style="text-decoration: none; color: inherit;">
                <h1>Ocular<span>Hub</span> Vision</h1>
            </a>
        </div>
        
        <div class="user-info">
            <p>Olá, <span>Dr. Rodrigo Yamaya</span> | <a href="login.html" style="color: #00aaff; font-size: 0.8rem; text-decoration: none;">Sair</a></p>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="../index.html">Novo Exame</a></li>
            <li><a href="pacientes.html">Pacientes</a></li>
            <li><a href="historico.html">Histórico</a></li>
            <li><a href="relatorio.html">Relatório final</a></li>
            <li><a href="novo_medico.html" class="active">Novo Médico</a></li>
        </ul>
    </nav>

    <main style="display: block; width: 100%;">
        <div class="container-cadastro-medico">
            <h2>Cadastrar Novo Médico</h2>
            
            <form id="formMedico">
                <div class="grupo-input">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required placeholder="Ex: Dr. João da Silva">
                </div>
                
                <div class="linha-inputs">
                    <div class="grupo-input">
                        <label for="crm">CRM</label>
                        <input type="text" id="crm" required placeholder="000000-UF">
                    </div>
                    <div class="grupo-input">
                        <label for="especialidade">Especialidade</label>
                        <input type="text" id="especialidade" required placeholder="Ex: Oftalmologia">
                    </div>
                </div>

                <div class="grupo-input">
                    <label for="email">E-mail Profissional</label>
                    <input type="email" id="email" required placeholder="medico@hospital.com">
                </div>

                <div class="linha-inputs">
                    <div class="grupo-input">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" required placeholder="Crie uma senha forte">
                    </div>
                    <div class="grupo-input">
                        <label for="confirmarSenha">Confirmar Senha</label>
                        <input type="password" id="confirmarSenha" required placeholder="Repita a senha">
                    </div>
                </div>

                <div class="botoes-form">
                    <a href="../index.html" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-salvar btn-cadastrar">Finalizar Cadastro</button>
                </div>
                
                <div id="mensagem" class="status-msg"></div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 OcularHub Vision - Desenvolvido por RodSolution</p>
    </footer>

    <script src="../js/auth.js"></script>
</body>
</html>
