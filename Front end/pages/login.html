<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OcularHub Vision</title>
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

<main class="auth-page">
    <div class="auth-card">
        <div class="logo">
            <h1>Ocular<span>Hub</span> Vision</h1>
        </div>

        <h2>Bem-vindo de volta</h2>
        <p>Acesse sua conta para gerenciar exames.</p>

        <form id="formLogin">
            <div class="input-group">
                <label for="email">E-mail Profissional</label>
                <input type="email" id="email" placeholder="medico@exemplo.com" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <div class="password-wrapper" style="position: relative;">
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                    <button type="button" id="toggleSenha" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer;">
                        👁️
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-cadastrar">Entrar no Sistema</button>
        </form>

        <div id="mensagem" class="status-msg"></div>

        <p class="footer-link">Ainda não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
    </div>
</main>

<footer>
    <p>&copy; 2026 OcularHub Vision - Desenvolvido por RodSolution</p>
</footer>

<script src="../js/auth.js"></script>
</body>
</html>
